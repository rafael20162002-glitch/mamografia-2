<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Requisição de Mamografia</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#004080;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input{
padding:10px;
width:100%;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0073e6;
color:white;
border:none;
padding:12px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#005bb5;
}

#documento{
display:none;
margin-top:40px;
background:white;
padding:40px;
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
color:#777;
}

@media print{

body *{
visibility:hidden;
}

#documento, #documento *{
visibility:visible;
}

#documento{
position:absolute;
top:0;
left:0;
}

}

</style>

</head>

<body>

<header>

Sistema de Requisição de Mamografia

</header>

<div class="container">

<h2>Dados da Paciente</h2>

<div class="grid">

<input id="nome" placeholder="Nome da paciente">

<input id="cpf" placeholder="CPF">

<input id="sus" placeholder="Cartão SUS">

<input id="nascimento" type="date">

<input id="municipio" placeholder="Município">

<input id="telefone" placeholder="Telefone">

</div>

<button onclick="gerar()">Gerar Requisição</button>

</div>

<div id="documento">

<h2>REQUISIÇÃO DE MAMOGRAFIA</h2>

<p><b>Nome:</b> <span id="r_nome"></span></p>

<p><b>CPF:</b> <span id="r_cpf"></span></p>

<p><b>Cartão SUS:</b> <span id="r_sus"></span></p>

<p><b>Nascimento:</b> <span id="r_nascimento"></span></p>

<p><b>Município:</b> <span id="r_municipio"></span></p>

<p><b>Telefone:</b> <span id="r_telefone"></span></p>

<br>

<button onclick="window.print()">Imprimir</button>

</div>

<footer>

Sistema interno de requisições médicas

</footer>

<script>

function gerar(){

document.getElementById("r_nome").innerText =
document.getElementById("nome").value

document.getElementById("r_cpf").innerText =
document.getElementById("cpf").value

document.getElementById("r_sus").innerText =
document.getElementById("sus").value

document.getElementById("r_nascimento").innerText =
document.getElementById("nascimento").value

document.getElementById("r_municipio").innerText =
document.getElementById("municipio").value

document.getElementById("r_telefone").innerText =
document.getElementById("telefone").value

document.getElementById("documento").style.display="block"

window.scrollTo(0,document.body.scrollHeight)

}

</script>

</body>

</html>
